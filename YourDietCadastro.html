<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourDiet</title>
  <link rel="stylesheet" href="YourDietCadastro.css" />

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
  
  

  <div class="main">
    <div class="container">
      <div class="left">
  <div class="header">

    <img class="logo" src="imagens/yourdietlogo.png" alt="YourDiet Logo" />

    <nav>
      <a href="#" onclick="window.location.href='YourDietSobreNos.html'" >SOBRE NÓS</a>
      <a href="#" onclick="window.location.href='YourDietContato.html'">CONTATO</a>
      <a href="#" onclick="window.location.href='YourDiet.html'">LOGIN</a>
    </nav>

    <div class="imagem-box">
    <img class="imagem" src="imagens/fotoparaareadeloginecadastro.png" />
  </div>

  </div>
</div>
      <div class="right">
        <h2>Cadastrar</h2>
                <form class="login-form" id="form-cadastro" onsubmit="return false;">
          <label for="usuario" class="sr-only">Nome de Usuário</label>
          <input id="usuario" type="text" placeholder="Nome de Usuário" required />

          <label for="email" class="sr-only">Endereço de Email</label>
          <input id="email" type="email" placeholder="Endereço de Email" required />

          <label for="senha" class="sr-only">Senha</label>
          <input id="senha" type="password" placeholder="Senha" required />

          <label for="confirma_senha" class="sr-only">Confirme sua Senha</label>
          <input id="confirma_senha" type="password" placeholder="Confirme sua Senha" required /> 

          <label for="data_nascimento" class="sr-only">Data de Nascimento</label>
          <input id="data_nascimento" type="date" required />

          <label for="sexo" class="sr-only">Sexo</label>
          <select id="sexo" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
              <option value="" disabled selected>Selecione o seu sexo</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
              <option value="O">Outro</option>
          </select>

          <button type="submit" class="btn primary">Criar Conta</button>
          <button type="button" class="btn ghost" onclick="window.location.href='YourDiet.html'">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
